{% include '_header.html' %}
<body class="d-flex flex-column min-vh-100">
  <main class="page-shell">
    <section class="page-hero">
      <div class="page-hero-copy">
        <h1 class="page-title">{{ title }} Interfaces</h1>
        <p class="page-subtitle">Review every {{ title | lower }} interface detected on this device.</p>
      </div>
    </section>

    <section class="theme-card card">
      <div class="card-body">
        <div class="interface-category-list d-flex flex-nowrap overflow-auto" tabindex="0" aria-label="{{ title }} interfaces">
          {% for interface in filtered_interfaces %}
            <div class="interface-category-card">
              {% include '_adapters-card.html' %}
            </div>
          {% endfor %}
        </div>
      </div>
    </section>
  </main>
</body>
{% include '_footer.html' %}
</html>
