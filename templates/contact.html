{% extends 'base.html' %}

{% block title %}Contact{% endblock %}

{% block content %}
<section class="page-hero">
  <div class="page-hero-copy">
    <p class="page-kicker">Support</p>
    <h1 class="page-title">Contact Us</h1>
    <p class="page-subtitle">Send a note about adapter behavior, scanning issues, or feature ideas.</p>
  </div>
</section>

<section class="theme-card card">
  <div class="card-body">
    <form id="contact-form" class="theme-form">
      <div class="form-group mb-0">
        <label for="name">Name</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="form-group mb-0">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="form-group mb-0">
        <label for="message">Message</label>
        <textarea class="form-control" id="message" rows="4" required></textarea>
      </div>
      <div class="theme-actions">
        <button type="submit" class="btn btn-primary">Send</button>
      </div>
    </form>
    <div id="contact-response" class="theme-results"></div>
  </div>
</section>
<script src="/static/js/contact.js"></script>
{% endblock %}
